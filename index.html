<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily FX 보고서 | 신한은행 S&T센터</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f8f9fa;color:#0b0b0b;min-height:100vh}
  .wrap{max-width:680px;margin:0 auto;padding:2rem 1rem}
  .header{margin-bottom:1.5rem}
  .bank{font-size:11px;color:#898781;letter-spacing:.05em;margin-bottom:.4rem}
  .title{font-size:24px;font-weight:500;color:#0b0b0b;margin-bottom:.4rem}
  .subtitle{font-size:12px;color:#52514e}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin:1.25rem 0}
  .stat{background:#fff;border:0.5px solid rgba(11,11,11,0.10);border-radius:10px;padding:.75rem 1rem;text-align:center}
  .stat .slbl{font-size:10px;color:#898781;margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.04em}
  .stat .sval{font-size:16px;font-weight:500;color:#185fa5}
  .divider{border:none;border-top:1px solid rgba(11,11,11,0.08);margin:1.25rem 0}
  .section-title{font-size:10px;font-weight:500;color:#898781;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.6rem}
  .report-list{display:flex;flex-direction:column;gap:.5rem}
  .report-item{background:#fff;border:0.5px solid rgba(11,11,11,0.10);border-radius:10px;padding:.85rem 1.1rem;display:flex;justify-content:space-between;align-items:center;text-decoration:none;color:#0b0b0b;transition:box-shadow .15s,border-color .15s}
  .report-item:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08);border-color:#185fa5}
  .report-item .left{display:flex;flex-direction:column;gap:.25rem}
  .report-item .date{font-size:13px;font-weight:500;color:#0b0b0b;display:flex;align-items:center;gap:.4rem}
  .report-item .rtitle{font-size:12px;color:#52514e}
  .report-item .tag{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:500;background:#eff6ff;color:#185fa5;display:inline-block;margin-top:2px}
  .report-item .arrow{color:#898781;font-size:14px;flex-shrink:0}
  .badge-new{background:#fef2f2;color:#e34948;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:500}
  .footer{margin-top:2rem;font-size:11px;color:#898781;text-align:center;line-height:1.7;padding-top:1rem;border-top:1px solid rgba(11,11,11,0.08)}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="bank">신한은행 S&amp;T센터 · Daily FX Economist View</div>
    <div class="title">FX 보고서 아카이브</div>
    <div class="subtitle">백석현 이코노미스트 · USD/KRW 일별 분석 보고서</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="slbl">누적 보고서</div>
      <div class="sval" id="totalCount">-</div>
    </div>
    <div class="stat">
      <div class="slbl">최근 업데이트</div>
      <div class="sval" id="latestDate" style="font-size:13px">-</div>
    </div>
    <div class="stat">
      <div class="slbl">최신 레인지</div>
      <div class="sval" id="latestRange" style="font-size:13px">-</div>
    </div>
  </div>

  <hr class="divider">
  <div class="section-title">보고서 목록</div>
  <div class="report-list" id="reportList"></div>

  <div class="footer">
    본 자료는 신한은행 S&amp;T센터 Daily FX Economist View를 기반으로 작성되었습니다.<br>
    투자 판단의 참고 자료로만 활용하시기 바랍니다.
  </div>

</div>

<script>
// ================================================================
// 새 보고서 업로드 시 배열 맨 위에 한 줄만 추가하세요!
// Claude가 매일 보고서 생성 시 추가할 코드를 함께 제공합니다.
// ================================================================
const reports = [
{
    file: 'index260702.html',
    date: '2026년 7월 2일 (목)',
    title: '변한곳과 변하지 않는곳',
    range: '1,544 – 1,557원'
  },
 {
    file: 'index260630.html',
    date: '2026년 6월 30일 (화)',
    title: '외국인 리밸런싱 달러매수 VS 수출네고 달러공급 충돌',
    range: '1,530 – 1,550원'
 },
  { 
    file: 'index260629.html',
    date: '2026년 6월 29일 (월)',
    title: 'AI의 벌크업: 기대와 우려 교차',
    range: '1,530 – 1,545원'
  
  },
  
  // ▼ 새 보고서는 배열 맨 위에 추가하세요 ▼
  // {
  //   file: 'index260630.html',
  //   date: '2026년 6월 30일 (화)',
  //   title: '보고서 제목',
  //   range: '1,xxx – 1,xxx원'
  // },
];

function renderReports() {
  const list = document.getElementById('reportList');
  const total = document.getElementById('totalCount');
  const latestDate = document.getElementById('latestDate');
  const latestRange = document.getElementById('latestRange');

  if (reports.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:2rem;color:#898781;font-size:13px">등록된 보고서가 없습니다.</div>';
    return;
  }

  total.textContent = reports.length + '건';
  const d = reports[0].date;
  latestDate.textContent = d.replace('년 ', '.').replace('월 ', '.').replace(/일.*/, '');
  latestRange.textContent = reports[0].range;

  list.innerHTML = reports.map((r, i) => `
    <a class="report-item" href="${r.file}">
      <div class="left">
        <div class="date">
          ${r.date}
          ${i === 0 ? '<span class="badge-new">NEW</span>' : ''}
        </div>
        <div class="rtitle">${r.title}</div>
        <div class="tag">예상 레인지: ${r.range}</div>
      </div>
      <div class="arrow">→</div>
    </a>
  `).join('');
}

renderReports();
</script>

</body>
</html>
